# XcodeGen project definition.
#
# Why XcodeGen instead of a checked-in .xcodeproj: the .xcodeproj is a giant
# auto-generated XML bundle that's painful to edit and merge. This declarative
# project.yml is the source of truth; running `xcodegen generate` produces the
# .xcodeproj from it. That keeps the project diffable and lets an agent (or a
# script) manage it as text.
#
# Generate with:   brew install xcodegen && xcodegen generate
# Then open:       open Tallystitch.xcodeproj

name: Tallystitch
options:
  bundleIdPrefix: com.tallystitch
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  TallystitchCore:
    path: Packages/TallystitchCore
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  Tallystitch:
    type: application
    platform: iOS
    sources:
      - path: Tallystitch
    dependencies:
      - package: TallystitchCore
      - package: Supabase
        product: Supabase
    settings:
      base:
        INFOPLIST_FILE: Tallystitch/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tallystitch.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.7"
        TARGETED_DEVICE_FAMILY: "1"   # iPhone
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
      configs:
        # Secrets.xcconfig injects SUPABASE_URL / SUPABASE_ANON_KEY into the
        # build so they reach Info.plist without being committed.
        debug:
          INCLUDED_SOURCE_FILE_NAMES: ""
    configFiles:
      Debug: Tallystitch/Config/Secrets.xcconfig
      Release: Tallystitch/Config/Secrets.xcconfig
    info:
      # XcodeGen regenerates this Info.plist from the properties below on every
      # `xcodegen generate`. Keep custom keys HERE (not only in the .plist) — a
      # property listed only in the file gets wiped on the next generate. The
      # SUPABASE_* values resolve from Secrets.xcconfig at build time; the URL
      # scheme is what lets magic-link / recovery deep links reopen the app.
      path: Tallystitch/App/Info.plist
      properties:
        CFBundleDisplayName: Tallystitch
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        CFBundleURLTypes:
          - CFBundleURLName: com.tallystitch.app
            CFBundleURLSchemes:
              - tallystitch
